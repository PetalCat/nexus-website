<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!--
    OG preview image. Rendered as SVG for crispness at any size; most
    crawlers accept SVG directly, and those that don't will fall back
    to the favicon until we generate a PNG rasterization.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0b0a"/>
      <stop offset="100%" stop-color="#050507"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8cfa3"/>
      <stop offset="100%" stop-color="#b8862e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="45%">
      <stop offset="0%" stop-color="#e8bc6a" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#e8bc6a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo mark (Playfair-italic "N" in the app's amber square) -->
  <g transform="translate(80, 80)">
    <rect width="76" height="76" rx="18" fill="url(#accent)"/>
    <text x="38" y="60" text-anchor="middle" font-family="Playfair Display, Georgia, serif"
      font-style="italic" font-weight="700" font-size="54" fill="#0d0b0a">N</text>
  </g>
  <text x="180" y="138" font-family="Inter, system-ui, sans-serif" font-weight="800"
    font-size="44" fill="#f3eee4" letter-spacing="-1">Nexus</text>

  <!-- Headline -->
  <text x="80" y="320" font-family="DM Sans, Inter, sans-serif" font-weight="800"
    font-size="96" fill="#f3eee4" letter-spacing="-3">All your media.</text>
  <text x="80" y="425" font-family="DM Sans, Inter, sans-serif" font-weight="800"
    font-size="96" fill="url(#accent)" letter-spacing="-3">One home.</text>

  <!-- Subhead -->
  <text x="80" y="495" font-family="DM Sans, Inter, sans-serif" font-weight="400"
    font-size="28" fill="#9a948a" letter-spacing="0">
    Unified self-hosted media frontend — movies, shows, music, books, games.
  </text>

  <!-- Tagline pill -->
  <g transform="translate(80, 530)">
    <rect x="0" y="0" width="250" height="40" rx="20" fill="#141110" stroke="#3a2f22" stroke-width="1"/>
    <circle cx="22" cy="20" r="4" fill="#e8bc6a"/>
    <text x="38" y="26" font-family="DM Sans, Inter, sans-serif" font-weight="600"
      font-size="13" fill="#c9a76a" letter-spacing="2">OPEN SOURCE · AGPL-3.0</text>
  </g>
</svg>
